# XcodeGen spec for Nunba Companion iOS app.
#
# Run `xcodegen generate` from this directory (on macOS) to produce
# NunbaCompanion.xcodeproj. The generated project is .gitignored —
# this YAML is the source of truth.
#
# Why XcodeGen:
#   - project.pbxproj is an opaque UUID-laden plist that's hostile to
#     code review and merge conflicts. Declarative YAML is reviewable.
#   - We can edit the project structure from Windows/Linux without
#     opening Xcode.
#   - New native modules become a one-line addition under sources.
#
# Install on macOS:
#   brew install xcodegen
#
# Generate after any change to this file or after a fresh checkout:
#   xcodegen generate
#   pod install
#   open NunbaCompanion.xcworkspace

name: NunbaCompanion

options:
  bundleIdPrefix: com.hertzai
  deploymentTarget:
    iOS: '15.1'
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: '5.9'
    IPHONEOS_DEPLOYMENT_TARGET: '15.1'
    TARGETED_DEVICE_FAMILY: '1,2'  # iPhone (1) + iPad (2) — universal
    ENABLE_BITCODE: false
    SUPPORTS_MACCATALYST: false
    CODE_SIGN_STYLE: Automatic
    # CODE_SIGN_IDENTITY left empty — set DEVELOPMENT_TEAM via Xcode
    # signing automatic flow OR pass via xcodebuild flag for CI.
    DEVELOPMENT_TEAM: ''
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: '-Onone'
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: 'DEBUG'
      GCC_PREPROCESSOR_DEFINITIONS: 'DEBUG=1'
      ENABLE_TESTABILITY: 'YES'
      ONLY_ACTIVE_ARCH: 'YES'
    Release:
      SWIFT_OPTIMIZATION_LEVEL: '-O'
      DEAD_CODE_STRIPPING: 'YES'
      ENABLE_TESTABILITY: 'NO'
      ONLY_ACTIVE_ARCH: 'NO'
      VALIDATE_PRODUCT: 'YES'
      # SWIFT_COMPILATION_MODE wholemodule = best Release perf
      SWIFT_COMPILATION_MODE: 'wholemodule'

targets:
  NunbaCompanion:
    type: application
    platform: iOS
    deploymentTarget: '15.1'
    sources:
      - path: NunbaCompanion
        excludes:
          # Info.plist is referenced via INFOPLIST_FILE setting,
          # not as a build source — would otherwise be copied twice.
          - 'Info.plist'
          # Bridging header is wired via SWIFT_OBJC_BRIDGING_HEADER;
          # excluding it from build sources prevents Xcode from
          # trying to compile it as a top-level header.
          - 'NunbaCompanion-Bridging-Header.h'
        # XcodeGen auto-classifies the rest of the directory:
        #   .swift / .m   → Compile Sources phase
        #   .storyboard / .xcassets / .xcprivacy → Copy Bundle Resources
        # No explicit per-file declarations needed for those.
      # The pre-bundled JS payload. Workflow runs `npx react-native
      # bundle` BEFORE xcodebuild and writes the file to ios/main.jsbundle.
      # Marked optional so dev builds (no pre-bundle) also succeed —
      # AppDelegate's bundleURL fallback then loads from Metro.
      - path: main.jsbundle
        type: file
        buildPhase: resources
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hertzai.nunbacompanion
        PRODUCT_NAME: NunbaCompanion
        DISPLAY_NAME: Nunba Companion
        INFOPLIST_FILE: NunbaCompanion/Info.plist
        TARGETED_DEVICE_FAMILY: '1,2'
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_OBJC_BRIDGING_HEADER: NunbaCompanion/NunbaCompanion-Bridging-Header.h
        OTHER_LDFLAGS:
          - '$(inherited)'
          - '-ObjC'

  NunbaCompanionTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: '15.1'
    sources:
      - NunbaCompanionTests
    dependencies:
      - target: NunbaCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hertzai.nunbacompanion.tests
        TEST_HOST: '$(BUILT_PRODUCTS_DIR)/NunbaCompanion.app/NunbaCompanion'
        BUNDLE_LOADER: '$(TEST_HOST)'
        SWIFT_OBJC_BRIDGING_HEADER: NunbaCompanion/NunbaCompanion-Bridging-Header.h
        # Test bundles don't need a hand-written Info.plist; Xcode
        # auto-generates one from the build settings below. Required
        # by xcodebuild's code-signing path on iOS 15+.
        GENERATE_INFOPLIST_FILE: 'YES'
        CURRENT_PROJECT_VERSION: '1'
        MARKETING_VERSION: '0.1.0'

  NunbaCompanionUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: '15.1'
    sources:
      - NunbaCompanionUITests
    dependencies:
      - target: NunbaCompanion
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hertzai.nunbacompanion.uitests
        TEST_TARGET_NAME: NunbaCompanion
        GENERATE_INFOPLIST_FILE: 'YES'
        CURRENT_PROJECT_VERSION: '1'
        MARKETING_VERSION: '0.1.0'

schemes:
  NunbaCompanion:
    build:
      targets:
        NunbaCompanion: all
        NunbaCompanionTests: [test]
        NunbaCompanionUITests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - NunbaCompanion
      targets:
        - NunbaCompanionTests
        - NunbaCompanionUITests
