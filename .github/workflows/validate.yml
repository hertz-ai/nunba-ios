# validate.yml — full-parity CI for Nunba Companion iOS.
#
# Every job is REQUIRED. Nothing is best-effort. A red X on any job
# blocks the merge.
#
# Job graph:
#
#     manifest-integrity ─┐
#                         ├─→ js-validate ─┐
#                         │                ├─→ ios-build (macOS) → ios-ipad-build
#                         │                │
#                         └─→ sync-drift   │  (independent — drift vs Android
#                                          │   doesn't affect iOS build correctness)
#
# iOS jobs deliberately do NOT depend on sync-drift. Drift means
# the vendored JS has fallen behind Android upstream — that's a
# content-freshness signal, NOT a build-integrity signal. The Swift
# code, RN bridge, and tests should compile and pass regardless of
# whether js/shared/ matches HEAD of Hevolve_React_Native today.
#
# manifest-integrity is the gate — if the vendored JS layout doesn't
# match the manifest, nothing else has a stable base to validate.
#
# sync-drift requires the secret ANDROID_REPO_TOKEN to be set
# (https://github.com/hertz-ai/nunba-ios/settings/secrets/actions)
# with read access to hertz-ai/Hevolve_React_Native. Without it the
# job fails by design — drift detection is a hard requirement, not
# best-effort.
#
# ios-build runs on macOS-14 (arm64). It's the slowest + most
# expensive job; gated behind the cheap js+manifest jobs so CI fails
# fast on common mistakes before paying for a Mac runner.

name: validate

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs of the same workflow on the same ref —
# saves CI minutes when someone pushes multiple commits in a row.
concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

env:
  # RN 0.81.4 requires node >= 20.19.4. Locking to 20.x picks the
  # latest minor automatically (CI runners track latest LTS within
  # the major).
  NODE_VERSION: '20'
  RUBY_VERSION: '3.2'
  # Xcode is selected dynamically per-runner — see "Select Xcode"
  # step below. Pinning to a hardcoded 16.x.y path is brittle
  # because GitHub-hosted images rotate point releases without
  # notice.

jobs:
  # ── 1. Manifest integrity ───────────────────────────────────────
  # Cheap. Catches "added file to js/shared/ without manifest entry"
  # and the reverse.

  manifest-integrity:
    name: Manifest integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate SHARED_JS_MANIFEST.json against js/shared/
        run: node scripts/validate-manifest.js

      - name: Verify manifest is valid JSON Schema-shape
        run: |
          node -e "
            const m = require('./docs/SHARED_JS_MANIFEST.json');
            if (!m.android_repo_path) throw new Error('missing android_repo_path');
            if (!Array.isArray(m.groups)) throw new Error('groups must be array');
            if (!Array.isArray(m.deliberately_excluded)) throw new Error('deliberately_excluded must be array');
            for (const g of m.groups) {
              if (!g.name) throw new Error('group missing name');
              if (!Array.isArray(g.files)) throw new Error('group ' + g.name + ' missing .files');
              for (const f of g.files) {
                // Two valid shapes: string (uses group prefixes) or
                // {src, dst} object (explicit per-file paths, used by
                // image-assets group whose PNGs live in scattered
                // directories across the Android repo).
                if (typeof f === 'string') continue;
                if (f && typeof f === 'object' && typeof f.src === 'string' && typeof f.dst === 'string') continue;
                throw new Error('invalid file entry in ' + g.name + ': must be string or {src,dst} object');
              }
            }
            console.log('manifest schema OK:', m.groups.length, 'groups');
          "

  # ── 2. JS validation: jest + TS contract typecheck ──────────────

  js-validate:
    name: JS (jest + tsc)
    runs-on: ubuntu-latest
    needs: manifest-integrity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-engines --network-timeout 600000

      - name: Run jest
        run: yarn test --ci

      - name: TypeScript typecheck on native-bridge contracts
        run: npx tsc --noEmit -p tsconfig.json

      - name: Verify shared JS files parse as JS
        # Catches "manifest copied a Java file by mistake" and similar.
        # Uses Node's own parser — fast, no dep.
        run: |
          set -e
          for f in $(find js/shared -name '*.js'); do
            node --check "$f" || { echo "FAIL: $f does not parse"; exit 1; }
          done
          echo "OK: all js/shared/*.js files parse"

  # ── 3. Sync drift vs Hevolve_React_Native (Android sibling) ─────
  # Clones the Android repo using a fine-grained PAT and runs
  # scripts/sync-from-android.js --check. Fails if any vendored file
  # has drifted from upstream.

  sync-drift:
    name: Sync drift vs Android
    runs-on: ubuntu-latest
    needs: manifest-integrity
    steps:
      - name: Verify ANDROID_REPO_TOKEN secret is set
        # Without this guard, the next step fails with a cryptic
        # "Input required and not supplied: token" message that
        # gives no hint about what to do. Fail early with a
        # human-readable explanation.
        env:
          TOKEN_PRESENT: ${{ secrets.ANDROID_REPO_TOKEN != '' }}
        run: |
          if [[ "$TOKEN_PRESENT" != "true" ]]; then
            echo "::error::ANDROID_REPO_TOKEN secret is not set."
            echo ""
            echo "This job clones the private hertz-ai/Hevolve_React_Native"
            echo "repo to detect drift in vendored JS files."
            echo ""
            echo "To fix:"
            echo "  1. Go to https://github.com/settings/personal-access-tokens/new"
            echo "  2. Resource owner: hertz-ai"
            echo "  3. Repository access: only hertz-ai/Hevolve_React_Native"
            echo "  4. Permissions → Repository → Contents: Read-only"
            echo "  5. Add as secret at https://github.com/hertz-ai/nunba-ios/settings/secrets/actions"
            echo "     Name: ANDROID_REPO_TOKEN"
            echo ""
            echo "See docs/CI.md for the full setup walkthrough."
            exit 1
          fi
          echo "ANDROID_REPO_TOKEN is set; proceeding with sync drift check."

      - name: Checkout iOS repo
        uses: actions/checkout@v4
        with:
          path: nunba-ios

      - name: Checkout Android repo (sibling)
        uses: actions/checkout@v4
        with:
          repository: hertz-ai/Hevolve_React_Native
          token: ${{ secrets.ANDROID_REPO_TOKEN }}
          path: Hevolve_React_Native
          # Shallow clone — we only need the working tree, not history.
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Run sync drift check
        working-directory: nunba-ios
        run: node scripts/sync-from-android.js --check

  # ── 4. iOS build + XCTest ───────────────────────────────────────
  # macOS-14 = arm64 runner with Xcode 16. Slowest job; gated on the
  # cheap jobs above so CI fails fast for non-iOS-specific mistakes.

  ios-build:
    name: iOS build + XCTest
    # macos-15 runner ships Xcode 16.x by default — required by
    # React Native 0.81.4 (which needs Xcode 16+ for the new
    # architecture/codegen pipeline). macos-14 only has Xcode 15.x
    # so it would compile-fail at the bridge generation step.
    runs-on: macos-15
    # Only gates on JS validation (not sync-drift). Drift is a
    # content-freshness signal that doesn't affect whether the iOS
    # app builds + tests pass — those are orthogonal concerns.
    needs: [js-validate]
    # Cold RN 0.81 + use_frameworks!:static + Hermes compile takes
    # ~40 min on macos-15 (xcodebuild output confirmed). 45 min was
    # too tight — boot+tests got the timeout. Warm DerivedData cache
    # cuts subsequent runs to ~10 min.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode 16.x
        # Don't pin to a specific Xcode point release — runner
        # images update without notice. Walk /Applications, pick
        # the highest 16.x version, select it. Falls back to
        # whatever's currently selected if no Xcode_16* found.
        run: |
          set -e
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -z "$XCODE_PATH" ]]; then
            echo "::warning::No Xcode 16.x found; using runner default"
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer$||')
          fi
          echo "Selecting: $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install xcodegen + xcbeautify
        # xcbeautify is the modern, statically-compiled replacement
        # for xcpretty (which used to be preinstalled on macOS
        # runners but was dropped from macos-15). Without a pretty-
        # printer the build pipe fails with exit 127 "command not
        # found" before any compiler output surfaces.
        run: brew install xcodegen xcbeautify

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Pre-bundle JS for simulator
        # Produces ios/main.jsbundle so the simulator app boots
        # without Metro. The file is registered as an optional
        # resource in xcodegen project.yml — present in CI builds,
        # absent in dev (where AppDelegate.bundleURL falls back to
        # Metro on http://localhost:8081). UI smoke tests look for
        # 'Nunba Companion' text which only renders when the JS
        # bundle loads successfully.
        run: |
          set -e
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Cache DerivedData
        # The first xcodebuild compile on a cold runner takes ~40 min
        # (Hermes, Folly, Yoga, all RN-Core, etc.). Caching DerivedData
        # cuts subsequent runs to ~5-10 min when only Swift sources
        # change. Cache key includes Podfile so a Pod version bump
        # invalidates correctly.
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/Podfile') }}-${{ hashFiles('ios/project.yml') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ hashFiles('ios/Podfile') }}-
            ${{ runner.os }}-deriveddata-

      - name: Install CocoaPods (with retry for flaky network)
        working-directory: ios
        # CocoaPods git-clones some pods (fast_float, boost, etc.)
        # directly from github.com. macos-15 runners occasionally
        # see DNS/connection failures to GitHub. Retry up to 3x
        # with backoff so a transient network blip doesn't burn
        # an entire 40-min build slot.
        run: |
          set -e
          for attempt in 1 2 3; do
            if pod install --repo-update; then
              echo "pod install succeeded on attempt $attempt"
              break
            fi
            if [[ $attempt -eq 3 ]]; then
              echo "::error::pod install failed after 3 attempts"
              exit 1
            fi
            echo "::warning::pod install failed (attempt $attempt) — retrying in 30s"
            sleep 30
          done

      - name: Build (Debug)
        working-directory: ios
        run: |
          set -o pipefail
          # Use generic/platform=iOS Simulator for build-for-testing
          # — compiles for ANY simulator slice without requiring a
          # specific device to exist. Necessary because runner image
          # rotates simulator names (no iPhone 15 on macos-15; iPhone
          # 16 today, 17 later). The actual run picks a real booted
          # device below.
          xcodebuild build-for-testing \
            -workspace NunbaCompanion.xcworkspace \
            -scheme NunbaCompanion \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcbeautify --renderer github-actions

      - name: Pick iPhone device name + reset simulator service
        # Two prior runs (iPhone 17 then iPhone 16) hung indefinitely
        # at `xcrun simctl bootstatus` on the macos-15 / Xcode 16
        # image. The CoreSimulatorService daemon was apparently in a
        # wedged state. Restart it before doing anything else, then
        # let xcodebuild handle the boot via -destination — its
        # internal boot path is more resilient than raw simctl.
        run: |
          set -e
          # Restart the CoreSimulator daemon. Cleared the boot-hang
          # in field reports; harmless if the daemon was healthy.
          sudo pkill -9 -f com.apple.CoreSimulator.CoreSimulatorService || true
          sleep 2
          # Pick a device NAME (not ID) so xcodebuild can match by
          # name + OS=latest and pick whichever runtime boots cleanly.
          NAME=""
          for v in 16 15 17 18; do
            if xcrun simctl list devices available | grep -qE "iPhone $v \("; then
              NAME="iPhone $v"
              break
            fi
          done
          if [ -z "$NAME" ]; then
            echo "::error::No iPhone simulator found"
            xcrun simctl list devices available | head -50
            exit 1
          fi
          echo "Selected $NAME"
          echo "IPHONE_SIM_NAME=$NAME" >> $GITHUB_ENV

      - name: Run XCTests + UI smoke tests on iPhone simulator
        working-directory: ios
        timeout-minutes: 40
        run: |
          set -o pipefail
          mkdir -p ../test-reports
          # xcodebuild auto-boots the simulator named in -destination.
          # The internal boot path retries + recovers from
          # CoreSimulator hangs better than raw simctl bootstatus.
          xcodebuild test-without-building \
            -workspace NunbaCompanion.xcworkspace \
            -scheme NunbaCompanion \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${IPHONE_SIM_NAME},OS=latest" \
            -resultBundlePath TestResults-iPhone.xcresult \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcbeautify --renderer github-actions \
                         --report junit \
                         --report-path ../test-reports/xctest-iphone.xml

      - name: Extract iPhone screenshots + UI hierarchy from .xcresult
        if: always()
        run: |
          mkdir -p artifacts/iphone-screenshots artifacts/iphone-attachments
          if [ -d ios/TestResults-iPhone.xcresult ]; then
            # Modern xcresulttool (Xcode 16+) needs --legacy for the
            # JSON dump and a different export path for attachments.
            # The bundle's internal storage is content-addressed, so
            # find -name '*.png' no longer hits — we have to ask
            # xcresulttool to export every attachment.
            xcrun xcresulttool get --legacy \
              --path ios/TestResults-iPhone.xcresult \
              --format json > artifacts/iphone-results.json 2>/dev/null || true

            # Export every test attachment (screenshots + UI hierarchy
            # strings + staticTexts dump). Newer flag: 'export attachments'.
            xcrun xcresulttool export attachments \
              --path ios/TestResults-iPhone.xcresult \
              --output-path artifacts/iphone-attachments \
              2>/dev/null || true

            # Move PNGs into the screenshots folder for the existing
            # artifact upload contract; the rest stay in iphone-attachments
            # (txt/json files for the UI hierarchy + staticTexts dump).
            find artifacts/iphone-attachments -name '*.png' -exec mv {} artifacts/iphone-screenshots/ \; 2>/dev/null || true

            echo "── extracted PNGs ──"
            ls artifacts/iphone-screenshots/ 2>/dev/null || echo "none"
            echo "── extracted attachments ──"
            ls artifacts/iphone-attachments/ 2>/dev/null || echo "none"

            # Print non-binary attachments (UI hierarchy + staticTexts)
            # straight into the build log so we don't need to download
            # the artifact zip to diagnose smoke-test failures.
            for f in artifacts/iphone-attachments/*.txt artifacts/iphone-attachments/all-static-texts*.* artifacts/iphone-attachments/ui-hierarchy*.* 2>/dev/null; do
              [ -f "$f" ] || continue
              echo "── $(basename "$f") ──"
              cat "$f" || true
            done
          fi

      - name: Upload iPhone test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone-test-results
          path: |
            ios/TestResults-iPhone.xcresult
            test-reports/xctest-iphone.xml
            artifacts/iphone-screenshots/
            artifacts/iphone-attachments/
            artifacts/iphone-results.json
          retention-days: 14

      - name: Publish XCTest summary
        if: always()
        run: |
          if [[ -f test-reports/xctest-iphone.xml ]]; then
            echo "### XCTest + UI smoke results (iPhone)" >> $GITHUB_STEP_SUMMARY
            grep -E '<testsuite ' test-reports/xctest-iphone.xml | head -20 >> $GITHUB_STEP_SUMMARY || true
          fi
          SCREENSHOT_COUNT=$(ls artifacts/iphone-screenshots/ 2>/dev/null | wc -l)
          echo "**iPhone screenshots captured**: $SCREENSHOT_COUNT" >> $GITHUB_STEP_SUMMARY

  # ── 5. iPad build (universal-target sanity check) ───────────────
  # Same scheme, different simulator destination. Catches accidental
  # iPhone-only assumptions (e.g. orientation lock) — needed because
  # we declared TARGETED_DEVICE_FAMILY=1,2 (universal).

  ios-ipad-build:
    name: iOS build (iPad)
    runs-on: macos-15
    needs: ios-build
    # Same reasoning as ios-build, but slightly shorter — by the
    # time this runs the DerivedData cache from ios-build's run is
    # warm, so the rebuild for iPad simulator slice is faster.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Select latest installed Xcode 16.x
        run: |
          set -e
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [[ -z "$XCODE_PATH" ]]; then
            echo "::warning::No Xcode 16.x found; using runner default"
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer$||')
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'yarn'

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true

      - name: Install xcodegen + xcbeautify
        # xcbeautify is the modern, statically-compiled replacement
        # for xcpretty (which used to be preinstalled on macOS
        # runners but was dropped from macos-15). Without a pretty-
        # printer the build pipe fails with exit 127 "command not
        # found" before any compiler output surfaces.
        run: brew install xcodegen xcbeautify

      - name: Install JS dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Pre-bundle JS for simulator
        # Produces ios/main.jsbundle so the simulator app boots
        # without Metro. The file is registered as an optional
        # resource in xcodegen project.yml — present in CI builds,
        # absent in dev (where AppDelegate.bundleURL falls back to
        # Metro on http://localhost:8081). UI smoke tests look for
        # 'Nunba Companion' text which only renders when the JS
        # bundle loads successfully.
        run: |
          set -e
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Restore CocoaPods cache
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile') }}-${{ hashFiles('package.json') }}

      - name: Restore DerivedData cache (warm from ios-build)
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('ios/Podfile') }}-${{ hashFiles('ios/project.yml') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-${{ hashFiles('ios/Podfile') }}-
            ${{ runner.os }}-deriveddata-

      - name: Install CocoaPods (with retry)
        working-directory: ios
        run: |
          set -e
          for attempt in 1 2 3; do
            if pod install; then
              break
            fi
            if [[ $attempt -eq 3 ]]; then exit 1; fi
            echo "::warning::pod install attempt $attempt failed — retrying"
            sleep 30
          done

      - name: Pick iPad device name + reset simulator service
        # See iPhone job for rationale: explicit simctl boot was
        # hanging on macos-15. Restart CoreSimulator daemon and let
        # xcodebuild auto-boot the named device via -destination.
        run: |
          set -e
          sudo pkill -9 -f com.apple.CoreSimulator.CoreSimulatorService || true
          sleep 2
          PATTERNS=(
            'iPad Pro 13-inch'
            'iPad Pro \(13-inch\)'
            'iPad Pro \(12.9-inch\)'
            'iPad Pro 11-inch'
            'iPad Pro'
            'iPad'
          )
          NAME=""
          for pattern in "${PATTERNS[@]}"; do
            CANDIDATE=$(xcrun simctl list devices available | grep -E "$pattern" | head -1 | sed -E 's/^[[:space:]]*([^(]+) \(.*$/\1/' | sed 's/[[:space:]]*$//' || true)
            if [ -n "$CANDIDATE" ]; then
              NAME="$CANDIDATE"
              echo "Matched pattern: $pattern -> $NAME"
              break
            fi
          done
          if [ -z "$NAME" ]; then
            echo "::error::No iPad simulator found on runner"
            xcrun simctl list devices available | head -50
            exit 1
          fi
          echo "IPAD_SIM_NAME=$NAME" >> $GITHUB_ENV

      - name: Build + test on iPad simulator
        working-directory: ios
        timeout-minutes: 40
        run: |
          set -o pipefail
          mkdir -p ../test-reports
          xcodebuild test \
            -workspace NunbaCompanion.xcworkspace \
            -scheme NunbaCompanion \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=${IPAD_SIM_NAME},OS=latest" \
            -resultBundlePath TestResults-iPad.xcresult \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcbeautify --renderer github-actions \
                         --report junit \
                         --report-path ../test-reports/xctest-ipad.xml

      - name: Extract iPad screenshots
        if: always()
        run: |
          mkdir -p artifacts/ipad-screenshots
          if [ -d ios/TestResults-iPad.xcresult ]; then
            find ios/TestResults-iPad.xcresult -name '*.png' -exec cp {} artifacts/ipad-screenshots/ \; 2>/dev/null || true
            ls artifacts/ipad-screenshots/ || echo "no screenshots extracted"
          fi

      - name: Upload iPad test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ipad-test-results
          path: |
            ios/TestResults-iPad.xcresult
            test-reports/xctest-ipad.xml
            artifacts/ipad-screenshots/
          retention-days: 14

      - name: Publish iPad XCTest summary
        if: always()
        run: |
          if [[ -f test-reports/xctest-ipad.xml ]]; then
            echo "### XCTest + UI smoke results (iPad)" >> $GITHUB_STEP_SUMMARY
            grep -E '<testsuite ' test-reports/xctest-ipad.xml | head -20 >> $GITHUB_STEP_SUMMARY || true
          fi
          SCREENSHOT_COUNT=$(ls artifacts/ipad-screenshots/ 2>/dev/null | wc -l)
          echo "**iPad screenshots captured**: $SCREENSHOT_COUNT" >> $GITHUB_STEP_SUMMARY
